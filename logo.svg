<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg"> <!-- Improvement rationale: 1. Strengthened RT monogram geometry. 2. Introduced triangular truss reference in the horizontal beam. 3. Increased stroke weight for small-scale legibility. 4. Maintains minimal industrial aesthetic of the original brand. --> <rect width="400" height="120" fill="#000000"/> <!-- RT Symbol --> <g transform="translate(70,20)" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"> <!-- vertical R/T spine --> <line x1="30" y1="0" x2="30" y2="60"/> <!-- mirrored second spine --> <line x1="50" y1="0" x2="50" y2="60"/> <!-- truss beam --> <line x1="10" y1="30" x2="70" y2="30"/> <!-- truss triangles --> <line x1="20" y1="30" x2="30" y2="20"/> <line x1="30" y1="20" x2="40" y2="30"/> <line x1="40" y1="30" x2="50" y2="20"/> <line x1="50" y1="20" x2="60" y2="30"/> </g> <!-- Wordmark -->
<text x="160" y="72" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="32" letter-spacing="4">
ROYCE TRUSS
</text>
</svg>
